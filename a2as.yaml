    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, current_user, db]
  analyze_dish:
    type: async
    module: back.src.recipes.router
    args: [request, file, location, current_user]
  check_favorite_status:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, current_user, db]
  default:
    type: sync
    module: back.src.recipes.router
    args: [self, obj]
  delete_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, current_user, db]
  get_all_categories:
    type: async
    module: back.src.recipes.router
    args: [request, db]
  get_all_dishes:
    type: async
    module: back.src.recipes.router
    args: [request, db, page, page_size, sort_by]
  get_favorite_revipes:
    type: async
    module: back.src.recipes.router
    args: [request, current_user, db, page, page_size, sort_by]
  get_health_categories:
    type: async
    module: back.src.recipes.router
    args: [request]
  get_my_recipes:
    type: async
    module: back.src.recipes.router
    args: [request, current_user, db, page, page_size, sort_by]
  get_public_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, db, page, page_size, sort_by]
  get_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, slug, db]
  get_recipe_image_url:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, current_user, db]
  patch_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, patch_data, db]
  proxy_recipe_image:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, db]
  remove_recipe_from_favorites:
    type: async
    module: back.src.recipes.router
    args: [request, recipe_id, current_user, db]
  robots_txt:
    type: sync
    module: back.src.main
  root:
    type: sync
    module: back.src.main
  save_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, file, recipe, current_user, db]
  sitemap:
    type: sync
    module: back.src.main
    args: [db]
  structured_data:
    type: sync
    module: back.src.main
    args: [db]
  update_recipe:
    type: async
    module: back.src.recipes.router
    args: [request, slug, recipe_update, current_user, db]
  web_manifest:
    type: sync
    module: back.src.main

networks:
  content:
    type: api
    actions: [GET]
    protocols: [https]
    params:
      caller: [sitemap]
      dynamic: "True"
      variable: content
  foodsnapai.food:
    type: api
    actions: [GET]
    urls: ['/{...}']
    protocols: [https]
    ports: ["443"]
    params:
      pattern: https://foodsnapai.food/recipe/{recipe.slug}
      caller: [structured_data]
  recipe_url:
    type: api
    actions: [GET]
    protocols: [https]
    params:
      caller: [sitemap]
      dynamic: "True"
      variable: recipe_url
